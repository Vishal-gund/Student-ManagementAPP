<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Student Data</title>
	<link rel="stylesheet" th:href="@{/css/viewData.css}"/>
	
	<!-- for navbar css thats why added here -->
	
	<link rel="stylesheet"
	         href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

	   <!-- Custom CSS -->
	   <link rel="stylesheet" th:href="@{/css/home.css}">

</head>

<body>

    <!-- Navbar -->
    <div th:replace ="~{/home:: navbar-fragment}"></div>

    <!-- Dashboard Container -->
    <div class="container mt-4">

        <!-- Heading -->
        <h2 class="heading">Student Management Dashboard</h2>

        <!-- No Data -->
        <div th:if="${students.isEmpty()}" class="no-data">
            No Data Found
        </div>

        <!-- Table Card -->
        <div class="table-container" th:if="${!students.isEmpty()}">

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Course</th>
                        <th>Department</th>
                        <th>Year</th>
                        <th>Percentage</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="s : ${students}">
                        <td th:text="${s.id}"></td>
                        <td th:text="${s.name}"></td>
                        <td th:text="${s.email}"></td>
                        <td th:text="${s.phone}"></td>
                        <td th:text="${s.course}"></td>
                        <td th:text="${s.department}"></td>
                        <td th:text="${s.year}"></td>
                        <td th:text="${s.percentage}"></td>
                        <td th:text="${s.status}"></td>

                        <td>
                            <a th:href="@{/edit/{id}(id=${s.id})}">
                                <button class="update-btn">Update</button>
                            </a>

                            <a th:href="@{/delete/{id}(id=${s.id})}" 
                               onclick="return confirm('Are you sure?')">
                                <button class="delete-btn">Delete</button>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

</body>

</html>
